<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Richfield Connect | Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="profile">
    <header class="site-header">
      <nav class="navbar container" aria-label="Primary navigation">
        <a class="brand" href="index.html">Richfield Connect</a>
        <button class="nav-toggle" type="button" aria-label="Toggle navigation">
          ☰
        </button>
        <div class="nav-links">
          <a href="index.html" class="nav-link">Home</a>
          <a href="about.html" class="nav-link">About</a>
          <a href="signup.html" class="nav-link">Sign Up</a>
          <a href="profile.html" class="nav-link active">Profile</a>
          <a href="feed.html" class="nav-link">Feed</a>
        </div>
      </nav>
    </header>

    <main class="page-section">
      <div class="container">
        <div id="profile-empty-state" class="card empty-state hidden">
          <h1>No profile found</h1>
          <p>
            You have not signed up yet. Please create your Richfield Connect account to view your
            profile.
          </p>
          <a href="signup.html" class="button primary-button">Go to Sign Up</a>
        </div>

        <section id="profile-content" class="profile-layout hidden">
          <article class="card profile-summary">
            <span class="eyebrow">Student profile</span>
            <h1 id="profile-name"></h1>
            <p id="profile-email" class="profile-email"></p>
            <div class="tag-list" id="profile-interests"></div>
          </article>

          <article class="card profile-details-card">
            <button class="toggle-button" type="button" data-target="#academic-section">
              Academic Info
            </button>
            <div class="detail-section" id="academic-section">
              <dl class="detail-list">
                <div>
                  <dt>Student Number</dt>
                  <dd id="profile-student-number"></dd>
                </div>
                <div>
                  <dt>Campus / DL</dt>
                  <dd id="profile-campus"></dd>
                </div>
              </dl>
            </div>

            <button class="toggle-button" type="button" data-target="#bio-section">Bio</button>
            <div class="detail-section" id="bio-section">
              <p id="profile-bio"></p>
            </div>
          </article>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>Your profile information is loaded dynamically from browser localStorage.</p>
      </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
